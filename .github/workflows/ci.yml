name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build engine
        run: npm run build

      - name: Compile published schemas
        working-directory: packages/engine
        run: npm run schema:check

      - name: Install Playwright Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Validate example contract
        working-directory: examples/minimal-node
        run: node ../../packages/engine/dist/cli/index.js plan validate

      - name: Run tests with coverage threshold
        run: npm run test:coverage

  preset-smoke:
    name: Preset smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Use .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Use Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Use Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"

      - name: Use pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Use Yarn Classic
        run: npm install --global yarn@1.22.22

      - name: Install SliceForge dependencies
        run: npm ci

      - name: Build engine
        run: npm run build

      - name: Execute preset fixture matrix
        run: npm run smoke:presets -w packages/engine
